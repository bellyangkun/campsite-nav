<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2196F3" />
  <title>露营地活动导航</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map"></div>

  <div class="top-bar">
    <div>
      <h1>🏕️ 露营地导航</h1>
      <div class="sub">选择活动地点，跟随路线前进</div>
    </div>
  </div>

  <!-- 目标下拉 + 类型过滤 -->
  <div class="search-bar">
    <div class="dest-top">
      <label for="destSelect">📍 目标</label>
      <select id="destSelect" class="dest-top-select">
        <option value="">-- 请选择 --</option>
      </select>
    </div>
    <div class="type-chips" id="typeChips">
      <button class="chip active" data-type="all">全部</button>
      <button class="chip" data-type="entrance">🚪 入口</button>
      <button class="chip" data-type="activity">⛺ 活动</button>
      <button class="chip" data-type="service">🛒 服务</button>
      <button class="chip" data-type="other">📍 其他</button>
    </div>
  </div>

  <!-- 加载进度 -->
  <div id="loadingIndicator" class="loading-indicator">
    <div class="loading-spinner"></div>
    <span>加载中...</span>
  </div>

  <div id="permBanner" class="perm-banner hidden">
    <span>需要授权方向传感器以提供更准确的行进方向</span>
    <button id="enableCompassBtn">启用指南针</button>
  </div>

  <div id="locateErrorBanner" class="locate-error-banner hidden" role="alert">
    <div class="locate-error-icon">📍⚠️</div>
    <div class="locate-error-body">
      <div class="locate-error-title">定位失败</div>
      <div class="locate-error-msg" id="locateErrorMsg">正在尝试获取位置...</div>
    </div>
    <div class="locate-error-actions">
      <button id="locateRetryBtn" class="locate-error-retry">重试</button>
      <button id="locateDismissBtn" class="locate-error-dismiss">知道了</button>
    </div>
  </div>

  <div class="bottom-sheet">
    <div id="routeInfo" class="route-info hidden">
      <!-- 主信息: 距离 + 时间 -->
      <div class="route-main">
        <div class="route-stat">
          <div class="stat-num" id="distText">-</div>
          <div class="stat-unit" id="distUnit">距离</div>
        </div>
        <div class="route-divider"></div>
        <div class="route-stat">
          <div class="stat-num" id="timeText">-</div>
          <div class="stat-unit">步行约</div>
        </div>
      </div>

      <!-- 方向指示 -->
      <div class="route-direction">
        <div class="dir-card dir-target">
          <div class="dir-icon" id="dirIcon">➤</div>
          <div class="dir-info">
            <div class="dir-label">目标方向</div>
            <div class="dir-value" id="dirText">-</div>
          </div>
        </div>
        <div class="dir-card">
          <div class="dir-icon" id="headIcon">🧭</div>
          <div class="dir-info">
            <div class="dir-label">当前朝向</div>
            <div class="dir-value" id="headText">-</div>
          </div>
        </div>
        <div class="dir-card">
          <div class="dir-icon" id="moveIcon">🚶</div>
          <div class="dir-info">
            <div class="dir-label">移动方向</div>
            <div class="dir-value" id="moveText">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="locateBtn" class="fab" title="定位到我">📍</button>
  <div id="compass" class="compass hidden"><div class="arrow">⬆</div></div>

  <!-- 百度地图 JS API (浏览器端 AK) -->
  <script src="https://api.map.baidu.com/api?v=3.0&ak=1HV0vtN8SaYv3OOIhtDxdTD1qKIRdPbe"></script>
  <script src="js/coords.js"></script>
  <script src="js/baidu-map.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
