<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2196F3" />
  <title>露营地活动导航</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map"></div>

  <div class="top-bar">
    <div>
      <h1>🏕️ 露营地导航</h1>
      <div class="sub">选择活动地点，跟随路线前进</div>
    </div>
  </div>

  <div id="permBanner" class="perm-banner hidden">
    <span>需要授权方向传感器以提供更准确的行进方向</span>
    <button id="enableCompassBtn">启用指南针</button>
  </div>

  <div class="bottom-sheet">
    <label for="destSelect">选择活动地点</label>
    <select id="destSelect">
      <option value="">-- 请选择 --</option>
    </select>

    <div id="routeInfo" class="route-info hidden">
      <div class="info-row">
        <span class="label">直线距离</span>
        <span id="distText" class="value">-</span>
      </div>
      <div class="info-row">
        <span class="label">目标方向</span>
        <span id="dirText" class="value">-</span>
      </div>
      <div class="info-row">
        <span class="label">当前朝向</span>
        <span id="headText" class="value">-</span>
      </div>
      <div class="info-row">
        <span class="label">移动方向</span>
        <span id="moveText" class="value">-</span>
      </div>
    </div>
  </div>

  <button id="locateBtn" class="fab" title="定位到我">📍</button>
  <div id="compass" class="compass hidden"><div class="arrow">⬆</div></div>

  <!-- 百度地图 JS API (浏览器端 AK) -->
  <script src="https://api.map.baidu.com/api?v=3.0&ak=1HV0vtN8SaYv3OOIhtDxdTD1qKIRdPbe"></script>
  <script src="js/coords.js"></script>
  <script src="js/baidu-map.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
