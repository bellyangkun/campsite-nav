<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2196F3" />
  <title>露营地活动导航</title>
  <link rel="stylesheet" href="css/style.css?v=0.7.4" />
</head>
<body>
  <div id="map"></div>

  <div class="top-bar">
    <div>
      <h1>🏕️ 露营地导航</h1>
      <div class="sub">选择活动地点，跟随路线前进</div>
    </div>
  </div>

  <!-- 目标下拉 + 类型过滤 + 工具栏 (3 块各自一行, 紧凑) -->
  <div class="search-bar">
    <div class="dest-top">
      <label for="destSelect">📍 目标</label>
      <select id="destSelect" class="dest-top-select">
        <option value="">-- 请选择 --</option>
      </select>
      <button id="endNavBtn" class="end-nav-inline-btn hidden" title="结束导航">✕ 结束导航</button>
    </div>
    <div class="type-chips" id="typeChips">
      <button class="chip active" data-type="all">全部</button>
      <button class="chip" data-type="entrance">🚪 入口</button>
      <button class="chip" data-type="activity">⛺ 活动</button>
      <button class="chip" data-type="flash">⚡ 快闪</button>
      <button class="chip" data-type="restaurant">🍽️ 餐厅</button>
      <button class="chip" data-type="teahouse">🍵 茶馆</button>
      <button class="chip" data-type="hotel">🏨 酒店</button>
      <button class="chip" data-type="service">🛒 服务</button>
      <button class="chip" data-type="toilet">🚻 卫生间</button>
      <button class="chip" data-type="other">📍 其他</button>
    </div>
    <!-- 工具栏: 单独一行, 7 按钮紧凑横排, 水平滚动 -->
    <div class="quick-toolbar" id="quickToolbar">
      <button class="tool-btn tool-call" id="toolCallBtn" title="一键呼叫前台">
        <span class="tool-icon">📞</span>
        <span class="tool-label">呼叫</span>
      </button>
      <button class="tool-btn tool-ai" id="toolAiBtn" title="AI 客服咨询">
        <span class="tool-icon">🤖</span>
        <span class="tool-label">AI</span>
      </button>
    </div>
  </div>

  <!-- 加载进度 -->
  <div id="loadingIndicator" class="loading-indicator">
    <div class="loading-spinner"></div>
    <span>加载中...</span>
  </div>

  <div id="permBanner" class="perm-banner hidden">
    <span>需要授权方向传感器以提供更准确的行进方向</span>
    <button id="enableCompassBtn">启用指南针</button>
  </div>

  <div id="locateErrorBanner" class="locate-error-banner hidden" role="alert">
    <div class="locate-error-icon">📍⚠️</div>
    <div class="locate-error-body">
      <div class="locate-error-title">定位失败</div>
      <div class="locate-error-msg" id="locateErrorMsg">正在尝试获取位置...</div>
    </div>
    <div class="locate-error-actions">
      <button id="locateRetryBtn" class="locate-error-retry">重试</button>
      <button id="locateDismissBtn" class="locate-error-dismiss">知道了</button>
    </div>
  </div>

  <div class="bottom-sheet" id="bottomSheet">
    <!-- 折叠/展开 按钮 (手柄) -->
    <button id="toggleSheetBtn" class="sheet-handle" title="折叠/展开" aria-label="折叠/展开">
      <span class="sheet-handle-icon">▼</span>
    </button>

    <!-- (v0.6.4 工具栏已移入 search-bar) -->

    <div id="routeInfo" class="route-info hidden">
      <!-- 主信息: 距离 + 时间 -->
      <div class="route-main">
        <div class="route-stat">
          <div class="stat-num" id="distText">-</div>
          <div class="stat-unit" id="distUnit">距离</div>
        </div>
        <div class="route-divider"></div>
        <div class="route-stat">
          <div class="stat-num" id="timeText">-</div>
          <div class="stat-unit">步行约</div>
        </div>
      </div>

      <!-- 步行导航按钮组 (步行 + 驾车 + AR 合影) -->
      <div class="nav-btn-group">
        <button id="baiduNavBtn" class="nav-btn">
          🚶 步行导航
        </button>
        <button id="baiduDriveBtn" class="nav-btn nav-btn-secondary">
          🚗 驾车导航
        </button>
      </div>
      <div id="navWeixinHint" class="nav-weixin-hint hidden">
        ⚠️ 微信内请点击右上角 <strong>···</strong> → <strong>在浏览器中打开</strong>
      </div>

      <!-- 方向指示 -->
      <div class="route-direction">
        <div class="dir-card dir-target">
          <div class="dir-icon" id="dirIcon">➤</div>
          <div class="dir-info">
            <div class="dir-label">目标方向</div>
            <div class="dir-value" id="dirText">-</div>
          </div>
        </div>
        <div class="dir-card">
          <div class="dir-icon" id="headIcon">🧭</div>
          <div class="dir-info">
            <div class="dir-label">当前朝向</div>
            <div class="dir-value" id="headText">-</div>
          </div>
        </div>
        <div class="dir-card">
          <div class="dir-icon" id="moveIcon">🚶</div>
          <div class="dir-info">
            <div class="dir-label">移动方向</div>
            <div class="dir-value" id="moveText">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="locateBtn" class="fab" title="定位到我">📍</button>
  <div id="compass" class="compass hidden"><div class="arrow">⬆</div></div>

  <!-- 百度地图 JS API (浏览器端 AK) -->
  <script src="https://api.map.baidu.com/api?v=3.0&ak=1HV0vtN8SaYv3OOIhtDxdTD1qKIRdPbe"></script>
  <script src="js/coords.js"></script>
  <script src="js/baidu-map.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js?v=0.7.4"></script>
  <script src="js/extras.js"></script>
  <script src="js/booking.js"></script>
  <script src="js/checkin.js"></script>
  <script src="js/login.js"></script>
  <script src="js/coupons.js"></script>
  <script src="js/ar.js"></script>
</body>
</html>
